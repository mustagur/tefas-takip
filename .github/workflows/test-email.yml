name: 🧪 Email Test (Quick)

# Sadece manuel tetikleme - test için
on:
  workflow_dispatch:
    inputs:
      test_message:
        description: 'Test mesajı (opsiyonel)'
        required: false
        default: 'Hızlı Email Testi'

jobs:
  test-email:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install basic dependencies
      run: |
        python -m pip install --upgrade pip
        # Sadece email için gerekli paketler
        pip install requests beautifulsoup4 lxml openpyxl
    
    - name: 🔍 Environment Debug
      env:
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        echo "🔍 GitHub Secrets Kontrolü:"
        echo "SMTP_USER: $(if [ -n "$SMTP_USER" ]; then echo '✅ SET'; else echo '❌ NOT SET'; fi)"
        echo "SMTP_PASSWORD: $(if [ -n "$SMTP_PASSWORD" ]; then echo "✅ SET (length: ${#SMTP_PASSWORD})"; else echo '❌ NOT SET'; fi)"
        echo "RECIPIENT_EMAIL: $(if [ -n "$RECIPIENT_EMAIL" ]; then echo '✅ SET'; else echo '❌ NOT SET'; fi)"
        echo ""
        echo "📋 Test Input: ${{ github.event.inputs.test_message }}"
        echo "🕐 Test Time: $(date)"
        echo "🤖 Runner: $(uname -a)"
    
    - name: 📧 Create Quick Test Email Script
      run: |
        cat > quick_email_test.py << 'EOF'
        #!/usr/bin/env python3
        import os
        import smtplib
        import ssl
        from email.mime.multipart import MIMEMultipart
        from email.mime.text import MIMEText
        from datetime import datetime
        
        def quick_email_test():
            print("🧪 GitHub Actions Quick Email Test")
            print("=" * 50)
            
            # Environment variables
            smtp_user = os.getenv('SMTP_USER')
            smtp_password = os.getenv('SMTP_PASSWORD')
            recipient_raw = os.getenv('RECIPIENT_EMAIL')
            test_msg = os.getenv('TEST_MESSAGE', 'Quick Test')
            
            # Çoklu email desteği - temizleme
            if ',' in recipient_raw:
                # Email'leri temizle
                email_list = []
                for email in recipient_raw.split(','):
                    clean_email = email.strip().replace('\\n', '').replace('\\r', '').replace('\\t', '')
                    if clean_email and '@' in clean_email:
                        email_list.append(clean_email)
                        
                recipient = email_list[0] if email_list else recipient_raw.split(',')[0].strip()
                print(f"📧 Çoklu email bulundu: {len(email_list)} adres")
                for i, email in enumerate(email_list[:3]):  # İlk 3'ünü göster
                    print(f"   {i+1}. {email}")
                if len(email_list) > 3:
                    print(f"   ... ve {len(email_list)-3} tane daha")
            else:
                recipient = recipient_raw.strip().replace('\\n', '').replace('\\r', '').replace('\\t', '')
                email_list = [recipient]
                print(f"📧 Tek email: {recipient}")
            
            print(f"📧 SMTP_USER: {'✅ SET' if smtp_user else '❌ MISSING'}")
            print(f"🔑 SMTP_PASSWORD: {'✅ SET (' + str(len(smtp_password)) + ' chars)' if smtp_password else '❌ MISSING'}")
            print(f"📨 RECIPIENT_EMAIL: {'✅ SET' if recipient else '❌ MISSING'}")
            
            if not smtp_user or not smtp_password or not recipient:
                print("\n❌ SECRETS MISSING - Simülasyon Modu")
                print("🔧 GitHub Secrets ayarlayın:")
                print("   Settings → Secrets and variables → Actions")
                print("   - SMTP_USER: Gmail adresiniz")
                print("   - SMTP_PASSWORD: 16 haneli App Password") 
                print("   - RECIPIENT_EMAIL: Alıcı email")
                return False
            
            try:
                print(f"\n📤 Test Email Gönderiliyor...")
                print(f"   From: {smtp_user}")
                print(f"   To: {recipient}")
                
                # Email oluştur
                msg = MIMEMultipart()
                msg['From'] = f'TEFAS Test <{smtp_user}>'
                msg['To'] = recipient
                msg['Subject'] = f'🧪 GitHub Actions Email Test - {datetime.now().strftime("%H:%M")}'
                
                body = f"""
                <html>
                <body>
                    <h2>🎉 GitHub Actions Email Test Başarılı!</h2>
                    <p><strong>Tarih:</strong> {datetime.now().strftime('%d/%m/%Y %H:%M:%S UTC')}</p>
                    <p><strong>Test Mesajı:</strong> {test_msg}</p>
                    <p><strong>Gönderici:</strong> {smtp_user}</p>
                    <p><strong>Alıcı:</strong> {recipient}</p>
                    
                    <h3>✅ Test Sonuçları:</h3>
                    <ul>
                        <li>GitHub Actions Environment: ✅ Çalışıyor</li>
                        <li>GitHub Secrets: ✅ Erişilebilir</li>
                        <li>Gmail SMTP: ✅ Bağlantı Başarılı</li>
                        <li>Email Gönderimi: ✅ Tamamlandı</li>
                    </ul>
                    
                    <p>🚀 <strong>TEFAS otomatik email sistemi hazır!</strong></p>
                    
                    <hr>
                    <small>Bu GitHub Actions test emailidir.</small>
                </body>
                </html>
                """
                
                msg.attach(MIMEText(body, 'html', 'utf-8'))
                
                # Gmail SMTP
                context = ssl.create_default_context()
                with smtplib.SMTP('smtp.gmail.com', 587) as server:
                    server.starttls(context=context)
                    server.login(smtp_user, smtp_password)
                    
                    text = msg.as_string()
                    server.sendmail(smtp_user, recipient, text)
                
                print("✅ EMAIL BAŞARIYLA GÖNDERİLDİ!")
                print("📧 Email kutunuzu kontrol edin")
                print("🎯 TEFAS sistemi çalışmaya hazır!")
                return True
                
            except smtplib.SMTPAuthenticationError as e:
                print(f"\n❌ SMTP KİMLİK DOĞRULAMA HATASI!")
                print(f"🔧 Gmail App Password kontrol edin:")
                print(f"   - 2-Step Verification aktif mi?")
                print(f"   - App Password doğru mu? (16 haneli)")
                print(f"   - myaccount.google.com → Security → App passwords")
                print(f"Error: {e}")
                return False
                
            except Exception as e:
                print(f"\n❌ EMAIL GÖNDERİM HATASI: {e}")
                return False
        
        if __name__ == "__main__":
            success = quick_email_test()
            exit(0 if success else 1)
        EOF
        
        chmod +x quick_email_test.py
    
    - name: 🚀 Run Email Test
      env:
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        TEST_MESSAGE: ${{ github.event.inputs.test_message }}
      run: |
        python3 quick_email_test.py
    
    - name: 📊 Test Summary
      if: always()
      run: |
        echo ""
        echo "📋 Test Özeti:"
        echo "=============="
        echo "🕐 Test Zamanı: $(date)"
        echo "🔧 Python Version: $(python3 --version)"
        echo "🌐 Runner OS: $(cat /etc/os-release | grep PRETTY_NAME)"
        echo ""
        echo "💡 Sonraki Adımlar:"
        echo "- ✅ Email gelirse: TEFAS sistemi hazır"
        echo "- ❌ Email gelmezse: Secrets kontrol edin"
        echo "- 📱 Spam klasörünü kontrol edin"
        echo ""
        echo "🔗 Ana TEFAS workflow: Daily TEFAS Report"